[tools]
# -- Nim ecosystem -------------------------------------------------------
"github:arnetheduck/nph" = "0.7.0"
"github:nim-lang/langserver" = { version = "1.12.0", exe = "nimlangserver" }

# -- Project tooling (build, lint, spell, licence) ------------------------
just = "1.48.0"
"github:terror/just-lsp" = "0.4.0"
node = "24"
"npm:cspell" = "9.7.0"
uv = "0.11.2"

# -- CLI utilities (not in Debian repos) ----------------------------------
yq = "4"
ast-grep = "0.38"
watchexec = "2"

[env]
NIM_VERSION = "2.2.8"
USE_BUILTIN_RIPGREP = "0"
