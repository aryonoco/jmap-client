name: jmap-client

networks:
  jmap-net:
    name: jmap-net

services:
  dev:
    container_name: jmap-client
    hostname: jmap-client
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        NIM_VERSION: "2.2.8"
    networks:
      - jmap-net
    volumes:
      - ..:/workspaces/jmap-client:cached
    init: true
    command: sleep infinity

  stalwart:
    image: stalwartlabs/stalwart:v0.15
    container_name: stalwart
    hostname: stalwart
    profiles:
      - stalwart
    networks:
      - jmap-net
    environment:
      - STALWART_ADMIN_PASSWORD=jmapdev
    ports:
      - "8080:8080"
    volumes:
      - jmc-stalwart-data:/opt/stalwart

  james:
    build:
      context: ./james-conf
      dockerfile: Dockerfile
    image: jmap-client/james:test
    # apache/james ships only linux/amd64 — pin the platform so arm64 hosts
    # (e.g. Apple Silicon under Orbstack) transparently emulate via QEMU
    # and amd64 hosts run natively.
    platform: linux/amd64
    container_name: james
    hostname: james
    profiles:
      - james
    networks:
      - jmap-net
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m
    ports:
      - "8001:80"
      - "8002:8000"
      - "2525:25"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

volumes:
  jmc-stalwart-data:
