name: jmap-client

networks:
  jmap-net:
    name: jmap-net

services:
  dev:
    container_name: jmap-client
    hostname: jmap-client
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        NIM_VERSION: "2.2.8"
    networks:
      - jmap-net
    volumes:
      - ..:/workspaces/jmap-client:cached
    init: true
    command: sleep infinity

  stalwart:
    image: stalwartlabs/stalwart:v0.15
    container_name: stalwart
    hostname: stalwart
    profiles:
      - stalwart
    networks:
      - jmap-net
    environment:
      - STALWART_ADMIN_PASSWORD=jmapdev
    ports:
      - "8080:8080"
    volumes:
      - jmc-stalwart-data:/opt/stalwart

  james:
    build:
      context: ./james-conf
      dockerfile: Dockerfile
    image: jmap-client/james:test
    # apache/james ships only linux/amd64 — pin the platform so arm64 hosts
    # (e.g. Apple Silicon under Orbstack) transparently emulate via QEMU
    # and amd64 hosts run natively.
    platform: linux/amd64
    container_name: james
    hostname: james
    profiles:
      - james
    networks:
      - jmap-net
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx512m
    ports:
      - "8001:80"
      - "8002:8000"
      - "2525:25"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  cyrus:
    # Cyrus 3.12.2 test image — amd64 manifest digest pinned 2026-05-04
    # via GHCR registry HTTP API; the `latest` OCI index points to
    # this manifest plus an attestation manifest. Re-pinning a newer
    # upstream is a follow-up commit, not part of Phase L.
    image: ghcr.io/cyrusimap/cyrus-docker-test-server@sha256:466dca4a7228ac28e239d926ae108291fdf8e940feae66d25c30e1b350967320
    platform: linux/amd64
    container_name: cyrus
    hostname: cyrus
    profiles:
      - cyrus
    networks:
      - jmap-net
    environment:
      - SKIP_CREATE_USERS=1
    ports:
      - "9080:8080"
      - "9001:8001"
    healthcheck:
      # The Cyrus test image ships no curl/wget; use the in-image
      # Perl to probe the Mojolicious admin server's TCP socket.
      # Healthy once the WebSocket port accepts connections — full
      # HTTP probing is left to the seed-cyrus.sh script which uses
      # the host's curl over the Docker network.
      test: ["CMD", "perl", "-MIO::Socket::INET", "-e", "IO::Socket::INET->new(PeerAddr => 'localhost:8001', Timeout => 2) or exit 1"]
      interval: 5s
      timeout: 3s
      retries: 24
      start_period: 30s

volumes:
  jmc-stalwart-data:
