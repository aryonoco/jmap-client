name: jmap-client

networks:
  jmap-net:
    name: jmap-net

services:
  dev:
    container_name: jmap-client
    hostname: jmap-client
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        NIM_VERSION: "2.2.8"
    networks:
      - jmap-net
    volumes:
      - ..:/workspaces/jmap-client:cached
    init: true
    command: sleep infinity

  stalwart:
    image: stalwartlabs/stalwart:v0.15
    container_name: stalwart
    hostname: stalwart
    profiles:
      - stalwart
    networks:
      - jmap-net
    environment:
      - STALWART_ADMIN_PASSWORD=jmapdev
    ports:
      - "8080:8080"
    volumes:
      - jmc-stalwart-data:/opt/stalwart

volumes:
  jmc-stalwart-data:
