# Configuration file for JMAP — overlay used in jmap-client integration tests.
# Copied into /root/conf/jmap.properties by the entrypoint wrapper. The only
# change from the apache/james:memory-3.9.0 default is the explicit url.prefix /
# websocket.url.prefix block: without these, James advertises
# http://localhost/jmap in the session document, which fails when the
# JMAP client runs in a sibling container on the docker network.

enabled=true

tls.keystoreURL=file://conf/keystore
tls.secret=james72laBalle
delay.sends.enabled=true

# Override the session-document apiUrl/downloadUrl/uploadUrl/eventSourceUrl
# so cross-container clients (devcontainer ↔ james) use the docker-network
# hostname rather than localhost. Port 80 is James's JMAP HTTP listener,
# exposed at host port 8001 for browser tooling but the in-network URL is
# what the JMAP client follows.
url.prefix=http://james:80
websocket.url.prefix=ws://james:80
