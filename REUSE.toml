version = 1

# =============================================================================
# Source Code (BSL-1.0)
# =============================================================================

[[annotations]]
path = [
  "src/**",
  "tests/**",
  "*.nimble",
  "config.nims",
  ".devcontainer/**",
  ".github/**",
  "justfile",
  "Makefile",
  "Dockerfile",
  "Containerfile",
  "**/*.toml",
  "**/*.json",
  "**/*.yml",
  "**/*.yaml",
  "**/*.env",
  ".gitignore",
  ".editorconfig",
  "nimble.lock",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Aryan Ameri <github@aryan.ameri.coffee>"
SPDX-License-Identifier = "BSL-1.0"

# =============================================================================
# Documentation (CC-BY-4.0)
# =============================================================================

[[annotations]]
path = ["docs/**", "**/*.md", "**/*.txt"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <github@aryan.ameri.coffee>"
SPDX-License-Identifier = "CC-BY-4.0"

# =============================================================================
# IETF RFCs (IETF Trust) — must come after docs to take precedence
# =============================================================================

[[annotations]]
path = ["docs/rfcs/**"]
precedence = "override"
SPDX-FileCopyrightText = "IETF Trust and the persons identified as authors of the code"
SPDX-License-Identifier = "LicenseRef-IETF-Trust"
