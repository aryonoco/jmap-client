version = 1

# =============================================================================
# Source Code (MPL-2.0) - Code with actual logic
# =============================================================================

[[annotations]]
path = ["src/**", "tests/**"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <info@ameri.me>"
SPDX-License-Identifier = "MPL-2.0"

# Nim project manifest and config
[[annotations]]
path = ["*.nimble", "config.nims"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <info@ameri.me>"
SPDX-License-Identifier = "0BSD"

# =============================================================================
# Plumbing/Config (0BSD) - Configuration without substantial logic
# =============================================================================

[[annotations]]
path = [".devcontainer/**", ".github/**"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <info@ameri.me>"
SPDX-License-Identifier = "0BSD"

# Build system and task runner configs
[[annotations]]
path = ["justfile", "Makefile", "Dockerfile", "Containerfile"]
SPDX-FileCopyrightText = "2026 Aryan Ameri <info@ameri.me>"
SPDX-License-Identifier = "0BSD"

# Data/config files (no logic)
[[annotations]]
path = [
  "**/*.toml",
  "**/*.json",
  "**/*.yml",
  "**/*.yaml",
  "**/*.env",
  ".gitignore",
  ".editorconfig",
  "nimble.lock",
]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <info@ameri.me>"
SPDX-License-Identifier = "0BSD"

# =============================================================================
# Documentation (CC-BY-4.0)
# =============================================================================

[[annotations]]
path = ["docs/**", "**/*.md", "**/*.txt"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <info@ameri.me>"
SPDX-License-Identifier = "CC-BY-4.0"
