version = 1

# =============================================================================
# Third-party tool configuration (not copyrightable)
# =============================================================================

[[annotations]]
path = [".serena/**"]
precedence = "override"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "CC0-1.0"

# =============================================================================
# Source Code (BSD-2-Clause)
# =============================================================================

[[annotations]]
path = [
  "src/**",
  "tests/**",
  "*.nimble",
  "config.nims",
  "nimble.paths",
  ".devcontainer/**",
  ".github/**",
  ".githooks/**",
  "justfile",
  "Makefile",
  "Dockerfile",
  "Containerfile",
  "**/*.toml",
  "**/*.json",
  "**/*.yml",
  "**/*.yaml",
  "**/*.env",
  ".gitignore",
  ".editorconfig",
  "nimble.lock",
  "**/*.cfg",
]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <github@aryan.ameri.coffee>"
SPDX-License-Identifier = "BSD-2-Clause"

# =============================================================================
# Documentation (CC-BY-4.0)
# =============================================================================

[[annotations]]
path = ["docs/**", "**/*.md", "**/*.txt"]
precedence = "closest"
SPDX-FileCopyrightText = "2026 Aryan Ameri <github@aryan.ameri.coffee>"
SPDX-License-Identifier = "CC-BY-4.0"

# =============================================================================
# IETF RFCs (IETF Trust) — must come after docs to take precedence
# =============================================================================

[[annotations]]
path = ["docs/rfcs/**"]
precedence = "override"
SPDX-FileCopyrightText = "IETF Trust and the persons identified as authors of the code"
SPDX-License-Identifier = "LicenseRef-IETF-Trust"
