# nimalyzer configuration

# Source directories
directory src
directory tests


# =============================================================================
# Enabled rules
# =============================================================================

# Prefer shorthand assignment operators (i += 1 not i = i + 1)
check assignments shorthand

# Case statements must have at least 2 branches
check caseStatements min 2

# Cyclomatic complexity ceiling (1-10 = low risk)
check complexity all 10

# No empty for loops, no unnecessary explicit iterators
check forStatements all

# All public symbols must have doc comments
check hasDoc all

# If statements: no negative conditions with else, no empty branches
check ifStatements all

# Variable shadowing detection
check localHides

# Objects: no public fields
check objects publicfields

# All parameters must be used
check params used all

# Consistent range spacing
check ranges spaces

# Detect var that could be let/const
check varUplevel

# =============================================================================
# Disabled rules (with justification)
# =============================================================================

# hasPragma — disabled because {.push raises: [].} applies module-wide.
# nimalyzer is syntax-only and cannot see push pragmas, so it falsely flags
# every borrowed proc and func as missing a raises annotation.

# namedParams — disabled because it fires on every Result combinator call
# (ok(), err(), valueOr()), doAssert(), and parseEnum(). Incompatible with
# railway-oriented programming style that pervades this codebase.

# namingConv — disabled because exported operator overloads (==, $, <, hash)
# appear as '*' to the syntax-level parser, causing false positives.
# Nim's built-in styleCheck:error already enforces NEP1 naming conventions.

# varDeclared — disabled because it flags Nim's implicit `result` variable
# and idiomatic type-inferred let bindings (let x = parseId("abc")).
# Type inference is standard Nim; requiring explicit types adds noise.

# tryStatements — disabled because the migration from nim-results to
# exception-based error handling (architecture revision Phase 0-3) introduced
# legitimate try/except blocks for lenient parsing helpers, assertion templates,
# and totality tests. The rule flags ALL try/except blocks, not just bare excepts.

# objects constructors — disabled (only publicfields kept) because the check
# expects newFoo/initFoo naming but this project uses parseFoo for smart
# constructors. objects standardtypes also disabled as fields use distinct
# types (Id, AccountId, etc.) not bare int/string, which is by design.
